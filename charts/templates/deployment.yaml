apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels: {{ include "smsmanager.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels: {{ include "smsmanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{ include "smsmanager.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8}}
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: password
            - name: CALENDAR_ICS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}
                  key: calendar_ics_url
            - name: PLATFORM_PARTNER_ID
              value: {{ .Values.platformPartnerId }}
            - name: HOST
              value: {{ .Values.smsHost }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
